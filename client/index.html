<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='10' fill='%232563eb'/><circle cx='13' cy='13' r='3' fill='white'/><circle cx='27' cy='13' r='3' fill='white'/><circle cx='20' cy='27' r='3' fill='white'/><line x1='13' y1='13' x2='27' y2='13' stroke='white' stroke-width='1.8'/><line x1='13' y1='13' x2='20' y2='27' stroke='white' stroke-width='1.8'/><line x1='27' y1='13' x2='20' y2='27' stroke='white' stroke-width='1.8'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamSync</title>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s, visibility 0.4s;
        background: #f8f9fc;
      }
      #app-loader.hide {
        opacity: 0;
        visibility: hidden;
      }
      #app-loader .logo {
        width: 48px;
        height: 48px;
        margin-bottom: 20px;
        animation: bounce-logo 1.8s ease-in-out infinite;
      }
      #app-loader .bar-container {
        width: 140px;
        height: 4px;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 16px;
        background: #e2e8f0;
      }
      #app-loader .bar {
        width: 40%;
        height: 100%;
        background: #2563eb;
        border-radius: 4px;
        animation: slide 1.2s ease-in-out infinite;
      }
      #app-loader .text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: 13px;
        letter-spacing: -0.01em;
        color: #94a3b8;
      }
      [data-theme="dark"] #app-loader {
        background: #141825;
      }
      [data-theme="dark"] #app-loader .bar-container {
        background: #2a3348;
      }
      [data-theme="dark"] #app-loader .text {
        color: #6b7a8d;
      }
      @keyframes bounce-logo {
        0%, 100% { transform: translateY(0) scale(1); }
        20% { transform: translateY(-12px) scale(1.05); }
        40% { transform: translateY(0) scale(0.95); }
        55% { transform: translateY(-6px) scale(1.02); }
        70% { transform: translateY(0) scale(0.98); }
        85% { transform: translateY(-2px) scale(1); }
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="app-loader">
      <svg class="logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#2563eb"/>
        <circle cx="13" cy="13" r="3" fill="white"/>
        <circle cx="27" cy="13" r="3" fill="white"/>
        <circle cx="20" cy="27" r="3" fill="white"/>
        <line x1="13" y1="13" x2="27" y2="13" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="13" y1="13" x2="20" y2="27" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="27" y1="13" x2="20" y2="27" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="13" cy="13" r="1.2" fill="#2563eb"/>
        <circle cx="27" cy="13" r="1.2" fill="#2563eb"/>
        <circle cx="20" cy="27" r="1.2" fill="#2563eb"/>
      </svg>
      <div class="bar-container"><div class="bar"></div></div>
      <p class="text">Loading TeamSync...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
